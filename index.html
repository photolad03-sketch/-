<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zobaer & Tashrifa | Wedding Invitation</title>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        font-family: 'Arial', sans-serif; 
        background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                    url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070&auto=format&fit=crop') no-repeat center center/cover;
        display: flex; justify-content: center; align-items: center; 
        min-height: 100vh; overflow: hidden; color: #fff;
    }
    .card-container {
        width: 350px; height: 550px; position: relative;
        background: rgba(255, 255, 255, 0.15);
        border: 2px solid #ffd700; border-radius: 20px;
        backdrop-filter: blur(15px); overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }
    .page {
        width: 100%; height: 100%; position: absolute;
        display: flex; flex-direction: column; justify-content: center;
        align-items: center; padding: 20px; text-align: center;
        transition: transform 0.8s ease-in-out, opacity 0.5s;
    }
    .logo-container {
        width: 140px; height: 140px; margin-bottom: 20px;
        border-radius: 50%; overflow: hidden; border: 3px solid #ffd700;
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    }
    .logo-container img { width: 100%; height: 100%; object-fit: cover; }
    h1, h2 { color: #ffd700; margin-bottom: 15px; text-shadow: 2px 2px 4px #000; }
    .btn {
        background: #ffd700; color: #3a0000; border: none;
        padding: 10px 20px; border-radius: 25px; cursor: pointer;
        font-weight: bold; margin-top: 15px; transition: 0.3s;
    }
    .btn:hover { transform: scale(1.05); background: #fff; }
    .img-box { width: 100%; max-height: 200px; object-fit: contain; margin-bottom: 10px; }
    .audio-box { margin-top: 15px; background: rgba(255,215,0,0.1); padding: 5px; border-radius: 30px; }
    
    /* ইনপুট স্টাইল */
    #admin-section { margin-top: 20px; border-top: 1px solid #ffd700; padding-top: 10px; width: 100%; }
    input { padding: 8px; border-radius: 15px; border: none; width: 80%; margin-bottom: 10px; text-align: center; }
    #generatedLink { font-size: 0.8em; word-break: break-all; color: #ffd700; }
    
    #page2, #page3 { transform: translateX(100%); opacity: 0; }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="page" id="page1">
            <div class="logo-container">
                <img src="https://i.ibb.co/Q7SXqWSb/converted.png">
            </div>
            <h1>শুভ বিবাহ</h1>
            <p>আমাদের জীবনের বিশেষ দিনে আপনাকে আমন্ত্রণ।</p>
            <button class="btn" onclick="nextPage(2)">ইনভিটেশন খুলুন ✉️</button>
        </div>

        <div class="page" id="page2">
            <h2>Zobaer & Tashrifa</h2>
            <img class="img-box" src="https://i.postimg.cc/ZnLYf9pT/ZOBAER-TASHRIFA-20260623-034748-0000.gif">
            <p id="guest-name" style="padding: 0 15px; font-size: 1.1em;">শ্রদ্ধেয় অতিথি, আমাদের বৈবাহিক জীবনের বিশেষ এই দিনে আপনার মূল্যবান উপস্থিতি আমাদের ধন্য করবে।</p>
            
            <div id="admin-section" style="display: none;">
                <input type="text" id="nameInput" placeholder="অতিথির নাম লিখুন">
                <br>
                <button class="btn" onclick="generateLink()">লিংক তৈরি করুন</button>
                <p id="generatedLink"></p>
            </div>
            
            <button class="btn" style="margin-top: 20px;" onclick="nextPage(3)">বিস্তারিত দেখুন 📍</button>
        </div>

        <div class="page" id="page3">
            <h2>অনুষ্ঠানস্থল</h2>
            <p><strong>স্থান:</strong> নরেন্দ্রপুর মোল্লাবাড়ি<br><strong>তারিখ:</strong> ২৭ জুন, ২০২৬</p>
            <div class="audio-box">
                <audio id="bg-music" src="https://archive.org/download/sue-lius-wedding-nasheed-muhammad-al-muqit-m-4-a-128-k/SueLius%20-%20Wedding%20Nasheed%20_%20Muhammad%20Al%20Muqit%28M4A_128K%29.m4a" controls></audio>
            </div>
            <button class="btn" onclick="share()">শেয়ার করুন 📲</button>
        </div>
    </div>

    <script>
        function nextPage(n) {
            document.querySelectorAll('.page').forEach((p, i) => {
                p.style.transform = i === n-1 ? 'translateX(0)' : (i < n-1 ? 'translateX(-100%)' : 'translateX(100%)');
                p.style.opacity = i === n-1 ? '1' : '0';
            });
            if(n > 1) document.getElementById('bg-music').play();
        }

        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');

        // যদি লিংকে নাম না থাকে, তবেই ইনপুট বক্স দেখাবে
        if(name) {
            document.getElementById('guest-name').textContent = "শ্রদ্ধেয় " + decodeURIComponent(name) + ", আমাদের বিয়েতে আপনাকে স্বাগতম।";
        } else {
            document.getElementById('admin-section').style.display = 'block';
        }

        function generateLink() {
            const inputName = document.getElementById('nameInput').value;
            if(!inputName) { alert("দয়া করে নাম লিখুন!"); return; }
            const baseUrl = window.location.origin + window.location.pathname;
            const newLink = `${baseUrl}?name=${encodeURIComponent(inputName)}`;
            document.getElementById('generatedLink').innerHTML = `লিংক তৈরি হয়েছে: <br><a href="${newLink}" style="color:white;">এখানে ক্লিক করে দেখুন</a>`;
        }

        function share() {
            const text = "Zobaer & Tashrifa-এর বিয়ের আমন্ত্রণে আপনাকে স্বাগতম!";
            if (navigator.share) { navigator.share({title: 'Wedding Invitation', text: text, url: window.location.href}); }
            else { alert("লিংক কপি হয়েছে!"); }
        }
    </script>
</body>
</html>
